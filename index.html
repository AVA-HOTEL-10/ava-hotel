<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AVA | Sistema de Gestión</title>
  <meta name="description" content="AVA Sistema de Gestión para hoteles y negocios" />

  <!-- Firebase SDK v9 compat -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- UI Libraries -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --bg: #f6f8fb;
      --surface: #ffffff;
      --surface-2: #f0f4f8;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --primary: #2563eb;
      --primary-2: #1d4ed8;
      --accent: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --info: #06b6d4;
      --shadow: 0 18px 45px rgba(15, 23, 42, .08);
      --radius: 18px;
      --sidebar: #0f172a;
      --sidebar-text: #cbd5e1;
      --sidebar-active: #1e293b;
    }

    html[data-theme="dark"] {
      --bg: #0b1220;
      --surface: #111827;
      --surface-2: #182235;
      --text: #f8fafc;
      --muted: #94a3b8;
      --line: #24324a;
      --primary: #60a5fa;
      --primary-2: #3b82f6;
      --accent: #34d399;
      --danger: #fb7185;
      --warning: #fbbf24;
      --info: #22d3ee;
      --shadow: 0 18px 45px rgba(0,0,0,.26);
      --sidebar: #020617;
      --sidebar-text: #cbd5e1;
      --sidebar-active: #111827;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    a { color: inherit; }

    .hidden { display: none !important; }
    .app-shell { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }

    .login-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(37,99,235,.22), transparent 34%),
        radial-gradient(circle at bottom right, rgba(16,185,129,.18), transparent 32%),
        var(--bg);
    }
    .login-card {
      width: min(460px, 100%);
      padding: 34px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }
    .brand-row { display:flex; align-items:center; gap:14px; margin-bottom: 22px; }
    .brand-mark {
      width: 52px; height: 52px; border-radius: 16px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white; display:grid; place-items:center; font-weight: 900; letter-spacing: .08em;
      box-shadow: 0 12px 24px rgba(37,99,235,.25);
    }
    .brand-title { margin:0; font-size: 29px; line-height:1; letter-spacing:-.04em; }
    .brand-sub { margin: 4px 0 0; color: var(--muted); font-size: 14px; }

    .sidebar {
      background: var(--sidebar);
      color: var(--sidebar-text);
      padding: 20px 16px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .sidebar .brand-row { margin-bottom: 22px; }
    .sidebar .brand-title { color: white; font-size: 24px; }
    .nav { display:flex; flex-direction:column; gap:6px; }
    .nav-btn {
      width:100%; border:0; background:transparent; color:var(--sidebar-text);
      display:flex; align-items:center; gap:12px; padding:12px 12px; border-radius:14px;
      text-align:left; transition:.2s ease; font-weight: 650;
    }
    .nav-btn svg { width:18px; height:18px; }
    .nav-btn:hover { background:rgba(255,255,255,.08); color:#fff; transform: translateX(2px); }
    .nav-btn.active { background:var(--sidebar-active); color:#fff; box-shadow: inset 3px 0 0 var(--primary); }

    .main { min-width:0; }
    .topbar {
      height: 74px; display:flex; align-items:center; justify-content:space-between; gap:16px;
      padding: 0 26px; background: color-mix(in srgb, var(--surface) 90%, transparent);
      border-bottom:1px solid var(--line); position:sticky; top:0; z-index:20; backdrop-filter: blur(14px);
    }
    .top-left { display:flex; flex-direction:column; gap:2px; }
    .page-kicker { color:var(--muted); font-size: 13px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; }
    .page-heading { margin:0; font-size: 21px; letter-spacing:-.02em; }
    .top-actions { display:flex; align-items:center; gap:10px; }
    .user-chip { display:flex; align-items:center; gap:8px; padding:9px 12px; border:1px solid var(--line); border-radius:999px; background:var(--surface); color:var(--muted); font-size:13px; }

    .content { padding: 26px; }
    .section-head { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; margin-bottom: 18px; }
    .section-head h2 { margin:0 0 6px; font-size: 28px; letter-spacing:-.04em; }
    .section-head p { margin:0; color:var(--muted); }

    .grid { display:grid; gap:16px; }
    .grid-2 { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0,1fr)); }
    .grid-4 { grid-template-columns: repeat(4, minmax(0,1fr)); }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }
    .metric-card { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; min-height:120px; }
    .metric-card .metric-title { color:var(--muted); font-weight:700; font-size:13px; text-transform:uppercase; letter-spacing:.06em; }
    .metric-card .metric-value { margin-top:8px; font-size:25px; font-weight:900; letter-spacing:-.04em; }
    .icon-bubble { width:44px; height:44px; display:grid; place-items:center; border-radius:15px; background: var(--surface-2); color: var(--primary); }

    .form-grid { display:grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap:14px; align-items:end; }
    .form-grid.two { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .form-grid.three { grid-template-columns: repeat(3, minmax(0,1fr)); }
    .form-grid .full { grid-column: 1 / -1; }
    .field { display:flex; flex-direction:column; gap:7px; position:relative; }
    label { color:var(--muted); font-weight:750; font-size:13px; }
    input, select, textarea {
      width:100%; border:1px solid var(--line); background:var(--surface); color:var(--text);
      border-radius:13px; padding:12px 13px; outline:none; transition:.18s ease;
    }
    textarea { min-height: 90px; resize: vertical; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 4px color-mix(in srgb, var(--primary) 18%, transparent); }
    input[readonly] { background: var(--surface-2); color: var(--muted); }

    .btn {
      border:0; border-radius:13px; padding:12px 15px; display:inline-flex; align-items:center; justify-content:center; gap:8px;
      font-weight:800; transition:.18s ease; white-space:nowrap;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background:var(--primary); color:white; }
    .btn-primary:hover { background:var(--primary-2); }
    .btn-soft { background:var(--surface-2); color:var(--text); border:1px solid var(--line); }
    .btn-danger { background: color-mix(in srgb, var(--danger) 14%, var(--surface)); color:var(--danger); border:1px solid color-mix(in srgb, var(--danger) 25%, transparent); }
    .btn-success { background: color-mix(in srgb, var(--accent) 14%, var(--surface)); color:var(--accent); border:1px solid color-mix(in srgb, var(--accent) 25%, transparent); }
    .btn-warning { background: color-mix(in srgb, var(--warning) 16%, var(--surface)); color:var(--warning); border:1px solid color-mix(in srgb, var(--warning) 25%, transparent); }
    .btn-sm { padding:8px 10px; border-radius:10px; font-size:12px; }

    .table-wrap { width:100%; overflow:auto; border:1px solid var(--line); border-radius:16px; }
    table { width:100%; border-collapse:collapse; min-width: 760px; }
    thead { background:var(--surface-2); }
    th, td { padding:13px 14px; border-bottom:1px solid var(--line); text-align:left; vertical-align:middle; }
    th { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.07em; }
    td { font-size:14px; }
    tr:last-child td { border-bottom:0; }

    .pill { display:inline-flex; align-items:center; gap:6px; border-radius:999px; padding:6px 10px; font-weight:800; font-size:12px; border:1px solid var(--line); background:var(--surface-2); }
    .pill.green { color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, var(--surface)); }
    .pill.red { color: var(--danger); background: color-mix(in srgb, var(--danger) 12%, var(--surface)); }
    .pill.yellow { color: var(--warning); background: color-mix(in srgb, var(--warning) 14%, var(--surface)); }
    .muted { color:var(--muted); }
    .mini { font-size:12px; color:var(--muted); }
    .amount { font-variant-numeric: tabular-nums; font-weight:850; }

    .toolbar { display:flex; flex-wrap:wrap; align-items:end; gap:12px; margin-bottom: 16px; }
    .toolbar .field { min-width: 180px; }
    .totalizer { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 16px; border-radius:16px; background:var(--surface-2); margin: 16px 0; }
    .totalizer strong { font-size: 20px; }

    .suggestions {
      position:absolute; top: calc(100% + 4px); left:0; right:0; z-index:60; background:var(--surface); border:1px solid var(--line);
      border-radius:14px; box-shadow: var(--shadow); max-height:220px; overflow:auto; display:none;
    }
    .suggestions.show { display:block; }
    .suggestion-item { padding:11px 12px; border-bottom:1px solid var(--line); cursor:pointer; }
    .suggestion-item:last-child { border-bottom:0; }
    .suggestion-item:hover { background:var(--surface-2); }

    .notice { padding:12px 14px; border-radius:14px; border:1px solid color-mix(in srgb, var(--info) 25%, transparent); background: color-mix(in srgb, var(--info) 12%, var(--surface)); color: var(--text); }
    .toast-wrap { position:fixed; right:18px; bottom:18px; z-index:9999; display:flex; flex-direction:column; gap:10px; }
    .toast { background:var(--surface); color:var(--text); border:1px solid var(--line); box-shadow:var(--shadow); border-radius:14px; padding:12px 14px; display:flex; align-items:center; gap:10px; min-width:260px; animation: slideIn .22s ease; }
    .toast.success { border-left:4px solid var(--accent); }
    .toast.error { border-left:4px solid var(--danger); }
    @keyframes slideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    .room-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(190px,1fr)); gap:16px; }
    .room-card { border:1px solid var(--line); border-radius:18px; padding:17px; background:var(--surface); box-shadow: var(--shadow); transition:.18s ease; cursor:pointer; }
    .room-card:hover { transform: translateY(-2px); }
    .room-card.free { border-color: color-mix(in srgb, var(--accent) 35%, var(--line)); background: color-mix(in srgb, var(--accent) 9%, var(--surface)); }
    .room-card.busy { border-color: color-mix(in srgb, var(--danger) 25%, var(--line)); background: color-mix(in srgb, var(--danger) 8%, var(--surface)); }
    .room-card.alert { border-color: color-mix(in srgb, var(--warning) 40%, var(--line)); background: color-mix(in srgb, var(--warning) 14%, var(--surface)); }
    .room-title { font-size: 22px; font-weight: 900; margin-bottom: 10px; }

    .modal-backdrop { position:fixed; inset:0; display:grid; place-items:center; background: rgba(2,6,23,.55); z-index:1000; padding:20px; }
    .modal { width:min(560px,100%); background:var(--surface); border:1px solid var(--line); border-radius:22px; box-shadow: var(--shadow); padding:22px; }
    .modal h3 { margin:0 0 8px; font-size: 23px; }
    .modal-actions { display:flex; justify-content:flex-end; gap:10px; margin-top:18px; flex-wrap:wrap; }

    /* MEJORA 1: botón X y controles visibles para cerrar el modal sin guardar */
    .room-modal-header {
      flex:0 0 auto; display:flex; align-items:flex-start; justify-content:space-between; gap:16px;
      padding:18px 22px; border-bottom:1px solid var(--line); background:var(--surface);
    }
    .room-modal-header h3 { margin:0 0 4px; }
    .room-modal-header p { margin:0; }
    .room-modal-close {
      width:40px; height:40px; flex:0 0 40px; padding:0; border-radius:12px;
    }

    /* MEJORA 2: scroll interno con encabezado y acciones siempre visibles */
    .room-renew-modal {
      width:min(720px,100%); max-height:calc(100vh - 40px); max-height:calc(100dvh - 40px); padding:0;
      display:flex; flex-direction:column; overflow:hidden;
    }
    .room-modal-body {
      flex:1 1 auto; min-height:0; overflow-y:auto; overscroll-behavior:contain;
      scrollbar-gutter:stable; padding:20px 22px;
    }
    .room-modal-footer {
      flex:0 0 auto; display:flex; justify-content:flex-end; align-items:center;
      gap:10px; flex-wrap:wrap; padding:16px 22px; border-top:1px solid var(--line);
      background:var(--surface); box-shadow:0 -10px 24px rgba(15,23,42,.05);
    }

    /* // MEJORA ACOMPAÑANTES */
    .companions-toggle {
      display:flex; align-items:center; gap:10px; width:100%; min-height:48px;
      padding:12px 14px; border:1px solid var(--line); border-radius:14px;
      background:var(--surface-2); color:var(--text); cursor:pointer;
    }
    .companions-toggle input { width:auto; margin:0; flex:0 0 auto; }
    .companions-panel {
      padding:16px; border:1px solid var(--line); border-radius:16px;
      background:color-mix(in srgb, var(--primary) 5%, var(--surface));
    }
    .companions-panel-head {
      display:flex; justify-content:space-between; align-items:center; gap:12px;
      margin-bottom:12px; flex-wrap:wrap;
    }
    .companions-panel-head h4 { margin:0; font-size:16px; }
    .companions-list { display:grid; gap:12px; }
    .companion-row {
      display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr) auto;
      gap:12px; align-items:end; padding:14px; border:1px solid var(--line);
      border-radius:14px; background:var(--surface);
    }
    .companions-summary-list { display:grid; gap:8px; }
    .companion-summary-item {
      display:flex; justify-content:space-between; align-items:flex-start; gap:14px;
      padding:10px 12px; border:1px solid var(--line); border-radius:12px;
      background:var(--surface);
    }

    .progress { height:13px; border-radius:999px; background:var(--surface-2); overflow:hidden; border:1px solid var(--line); }
    .progress > span { display:block; height:100%; width:0%; background: linear-gradient(90deg, var(--primary), var(--accent)); transition:.3s ease; }

    .empty-state { padding: 34px; text-align:center; color:var(--muted); }
    .mobile-nav-toggle { display:none; }
    .check-save { color:var(--accent); font-weight:900; opacity:0; transition:.2s ease; }
    .check-save.show { opacity:1; }

    @media (max-width: 1100px) {
      .grid-4 { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .grid-3 { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .form-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
    @media (max-width: 860px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar { position:fixed; z-index:200; left:0; top:0; bottom:0; width:280px; transform: translateX(-104%); transition:.25s ease; }
      .sidebar.open { transform: translateX(0); }
      .mobile-nav-toggle { display:inline-flex; }
      .topbar { padding:0 16px; }
      .content { padding: 18px; }
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
      .form-grid, .form-grid.two, .form-grid.three { grid-template-columns: 1fr; }
      .section-head { flex-direction:column; }
      .user-chip { display:none; }

      /* MEJORA 2: adaptación del modal con scroll para pantallas pequeñas */
      .room-renew-modal { border-radius:18px; }
      .room-modal-header, .room-modal-body, .room-modal-footer { padding-left:16px; padding-right:16px; }
      .room-modal-footer .btn { flex:1 1 calc(50% - 10px); }
      /* // MEJORA ACOMPAÑANTES */
      .companion-row { grid-template-columns:1fr; }
      .companion-row .btn { width:100%; }
      .companion-summary-item { flex-direction:column; gap:4px; }
    }
  </style>
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="brand-row">
        <div class="brand-mark">AVA</div>
        <div>
          <h1 class="brand-title">AVA</h1>
          <p class="brand-sub">Sistema de gestión hotelera y comercial</p>
        </div>
      </div>
      <form id="loginForm" class="grid" style="gap:14px">
        <div class="field">
          <label for="loginEmail">Correo electrónico</label>
          <input id="loginEmail" type="email" autocomplete="email" required placeholder="usuario@empresa.com" />
        </div>
        <div class="field">
          <label for="loginPassword">Contraseña</label>
          <input id="loginPassword" type="password" autocomplete="current-password" required placeholder="••••••••" />
        </div>
        <button class="btn btn-primary" type="submit"><i data-lucide="log-in"></i> Iniciar sesión</button>
        <p id="loginMsg" class="mini"></p>
      </form>
    </div>
  </div>

  <div id="app" class="app-shell hidden">
    <aside id="sidebar" class="sidebar">
      <div class="brand-row">
        <div class="brand-mark">AVA</div>
        <div>
          <h1 class="brand-title">AVA</h1>
          <p class="brand-sub">Gestión en tiempo real</p>
        </div>
      </div>
      <nav id="nav" class="nav"></nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <button id="openSidebar" class="btn btn-soft mobile-nav-toggle" type="button"><i data-lucide="menu"></i></button>
        <div class="top-left">
          <span class="page-kicker" id="pageKicker">Panel</span>
          <h2 class="page-heading" id="pageTitle">Dashboard</h2>
        </div>
        <div class="top-actions">
          <span class="user-chip"><i data-lucide="user-round"></i><span id="userEmail"></span> · <b id="userRole"></b></span>
          <button id="themeToggle" class="btn btn-soft" type="button" title="Cambiar tema"><i data-lucide="moon-star"></i></button>
          <button id="logoutBtn" class="btn btn-danger" type="button"><i data-lucide="log-out"></i> Salir</button>
        </div>
      </header>
      <section id="content" class="content"></section>
    </main>
  </div>

  <div id="modalRoot"></div>
  <div id="toastWrap" class="toast-wrap"></div>

<script>
/* ============================================================
   AVA - SISTEMA DE GESTIÓN
   HTML único autocontenido + Firebase Firestore en tiempo real
   ============================================================ */

/* =========================
   1. CONFIGURACIÓN FIREBASE
   ========================= */
const firebaseConfig = {
  apiKey: "AIzaSyDf_m9qQZRFx-3zee3WFcSssRJ-_zG89yA",
  authDomain: "ava-hotel-d3213.firebaseapp.com",
  projectId: "ava-hotel-d3213",
  storageBucket: "ava-hotel-d3213.firebasestorage.app",
  messagingSenderId: "1062400302863",
  appId: "1:1062400302863:web:ed62ccebd0d1946697687a",
  measurementId: "G-08V8EXFP5B"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const FV = firebase.firestore.FieldValue;

/* =========================
   2. ESTADO GLOBAL Y CONSTANTES
   ========================= */
const ADMIN_PASSWORD = 'avaadmin10';
const FILTER_PASSWORDS = ['avaadmin10', 'adminava10'];

const PRODUCT_TYPES = ['Producto Venta', 'Producto Insumo', 'Producto Activo Fijo', 'Producto Limpieza'];
const UNITS = ['Und', 'Gr', 'Lb', 'Kg', 'Lt', 'Ml'];
const PAYMENT_METHODS = ['Efectivo', 'Nequi', 'Transferencia', 'Tarjeta'];

const SECTIONS = [
  { id:'dashboard', label:'Dashboard', icon:'layout-dashboard', roles:['administrador'] },
  { id:'habitaciones', label:'Habitaciones', icon:'bed-double', roles:['administrador'] },
  { id:'clientes', label:'Clientes', icon:'users', roles:['administrador','trabajador'] },
  { id:'registro-huespedes', label:'Registro de Huéspedes', icon:'clipboard-plus', roles:['administrador'] },
  { id:'historial-registros', label:'Historial de Registros', icon:'history', roles:['administrador'] },
  { id:'facturacion', label:'Facturación', icon:'receipt', roles:['administrador','trabajador'] },
  { id:'ventas', label:'Ventas', icon:'trending-up', roles:['administrador','trabajador'] },
  { id:'ingreso-compras', label:'Ingreso de Compras', icon:'shopping-bag', roles:['administrador'] },
  { id:'historial-compras', label:'Historial de Compras', icon:'list-checks', roles:['administrador'] },
  { id:'ingreso-gastos', label:'Ingreso de Gastos', icon:'wallet-cards', roles:['administrador','trabajador'] },
  { id:'historial-gastos', label:'Historial de Gastos', icon:'file-minus', roles:['administrador'] },
  { id:'inventario', label:'Inventario', icon:'boxes', roles:['administrador'] },
  { id:'productos', label:'Productos', icon:'package-search', roles:['administrador'] },
  { id:'servicios', label:'Servicios', icon:'concierge-bell', roles:['administrador'] },
  { id:'cartera', label:'Cartera', icon:'hand-coins', roles:['administrador'] }
];

let currentUser = null;
let currentRole = null;
let activeSection = null;
let activeUnsubs = [];
let activeIntervals = [];
let chartInstances = {};
let filterUnlocked = {};

/* =========================
   3. UTILIDADES GENERALES
   ========================= */
const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
const serverNow = () => FV.serverTimestamp();
const isAdmin = () => currentRole === 'administrador';
const canAccess = id => {
  const section = SECTIONS.find(s => s.id === id);
  return !!section && section.roles.includes(currentRole);
};

function initIcons() {
  if (window.lucide) lucide.createIcons();
}

function money(value) {
  const n = Number(value || 0);
  return new Intl.NumberFormat('es-CO', {
    style:'currency', currency:'COP', minimumFractionDigits:0, maximumFractionDigits:2
  }).format(n);
}

function parseMoney(value) {
  if (typeof value === 'number') return value;
  return Number(String(value || '').replace(/[^0-9.-]/g, '')) || 0;
}

function safeNumber(value) {
  const n = Number(value);
  return Number.isFinite(n) ? n : 0;
}

function localDateInput(date = new Date()) {
  const d = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
  return d.toISOString().slice(0,10);
}

function localDateTime(date = new Date()) {
  return new Intl.DateTimeFormat('es-CO', {
    dateStyle: 'medium', timeStyle: 'short'
  }).format(date);
}

function normalizeDocId(text) {
  const base = String(text || '')
    .trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '')
    .slice(0, 140);
  return base || ('item-' + Date.now());
}

function getDocDate(data) {
  const raw = data.fecha || data.createdAt || data.updatedAt;
  if (!raw) return null;
  if (raw.toDate) return raw.toDate();
  return new Date(raw);
}

function inDateRange(data, start, end) {
  const d = getDocDate(data);
  if (!d || Number.isNaN(d.getTime())) return false;
  const from = new Date(start + 'T00:00:00');
  const to = new Date(end + 'T23:59:59.999');
  return d >= from && d <= to;
}

function daysInMonth(date) {
  return new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
}

function escapeHtml(text) {
  return String(text ?? '').replace(/[&<>'"]/g, ch => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#039;', '"':'&quot;'
  }[ch]));
}

function normalizeSearchText(text) {
  return String(text ?? '')
    .trim()
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '');
}

function toast(message, type='success') {
  const wrap = $('#toastWrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<i data-lucide="${type === 'error' ? 'circle-alert' : 'circle-check'}"></i><span>${escapeHtml(message)}</span>`;
  wrap.appendChild(el);
  initIcons();
  setTimeout(() => el.remove(), 3600);
}

function showError(err, fallback='Ocurrió un error') {
  console.error(err);
  toast(err?.message || fallback, 'error');
}

function confirmPassword(kind='admin') {
  const entered = prompt('Ingresa la contraseña de autorización:');
  if (kind === 'filter') return FILTER_PASSWORDS.includes(entered || '');
  return entered === ADMIN_PASSWORD;
}

function setupLiveClock(root=document) {
  const update = () => $$('.live-now', root).forEach(el => el.value = localDateTime(new Date()));
  update();
  const interval = setInterval(update, 1000);
  activeIntervals.push(interval);
}

function addUnsub(unsub) { activeUnsubs.push(unsub); }
function cleanupActive() {
  activeUnsubs.forEach(u => { try { u(); } catch(e) {} });
  activeUnsubs = [];
  activeIntervals.forEach(i => clearInterval(i));
  activeIntervals = [];
  Object.values(chartInstances).forEach(ch => { try { ch.destroy(); } catch(e) {} });
  chartInstances = {};
}

function sectionIntro(title, subtitle='') {
  return `<div class="section-head"><div><h2>${escapeHtml(title)}</h2><p>${escapeHtml(subtitle)}</p></div></div>`;
}

function emptyState(message='No hay registros para mostrar.') {
  return `<div class="empty-state"><i data-lucide="inbox"></i><p>${escapeHtml(message)}</p></div>`;
}

function setContent(html) {
  $('#content').innerHTML = html;
  initIcons();
}

function bindAutocomplete(input, box, itemsSource, getText, onSelect) {
  const render = () => {
    const q = input.value.trim().toLowerCase();
    if (!q) { box.classList.remove('show'); box.innerHTML=''; return; }
    const items = typeof itemsSource === 'function' ? itemsSource() : itemsSource;
    const seen = new Set();
    const matches = (items || [])
      .filter(item => getText(item).toLowerCase().includes(q))
      .filter(item => {
        const k = getText(item).toLowerCase();
        if (seen.has(k)) return false;
        seen.add(k);
        return true;
      })
      .slice(0, 9);
    box.innerHTML = matches.map((item, idx) => `<div class="suggestion-item" data-idx="${idx}">${escapeHtml(getText(item))}</div>`).join('');
    box.classList.toggle('show', matches.length > 0);
    $$('.suggestion-item', box).forEach(el => {
      el.addEventListener('mousedown', ev => {
        ev.preventDefault();
        const item = matches[Number(el.dataset.idx)];
        onSelect(item);
        box.classList.remove('show');
      });
    });
  };
  input.addEventListener('input', render);
  input.addEventListener('focus', render);
  input.addEventListener('blur', () => setTimeout(() => box.classList.remove('show'), 120));
}

function renderDateToolbar(sectionId, withType=false) {
  const today = localDateInput();
  return `
    <div class="toolbar" data-section-filter="${sectionId}">
      <div class="field"><label>Fecha inicio</label><input type="date" id="filterStart" value="${today}" /></div>
      <div class="field"><label>Fecha fin</label><input type="date" id="filterEnd" value="${today}" /></div>
      ${withType ? `<div class="field"><label>Tipo de producto</label><select id="filterType"><option value="">Todos</option>${PRODUCT_TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div>` : ''}
      <button class="btn btn-soft" type="button" id="resetToday"><i data-lucide="calendar-days"></i> Hoy</button>
    </div>`;
}

function bindDateFilterGuard(sectionId, onApply) {
  const today = localDateInput();
  const start = $('#filterStart');
  const end = $('#filterEnd');
  const type = $('#filterType');
  const reset = $('#resetToday');
  const apply = () => {
    const changingRange = start.value !== today || end.value !== today;
    if (changingRange && !filterUnlocked[sectionId]) {
      if (!confirmPassword('filter')) {
        start.value = today;
        end.value = today;
        toast('Rango bloqueado. Contraseña incorrecta.', 'error');
      } else {
        filterUnlocked[sectionId] = true;
        toast('Filtro desbloqueado');
      }
    }
    onApply();
  };
  [start, end].forEach(el => el.addEventListener('change', apply));
  if (type) type.addEventListener('change', onApply);
  if (reset) reset.addEventListener('click', () => { start.value=today; end.value=today; onApply(); });
}

function modal(html) {
  $('#modalRoot').innerHTML = `<div class="modal-backdrop"><div class="modal">${html}</div></div>`;
  initIcons();
}
function closeModal() { $('#modalRoot').innerHTML = ''; }

async function recomputeProductCost(description) {
  const productId = normalizeDocId(description);
  const snap = await db.collection('compras')
    .where('tipoProducto','==','Producto Venta')
    .where('descripcion','==',description)
    .get();
  let latest = null;
  snap.forEach(doc => {
    const data = doc.data();
    const d = getDocDate(data) || new Date(0);
    if (!latest || d > latest.date) latest = { date:d, data };
  });
  const cost = latest ? safeNumber(latest.data.valorUnitario) : 0;
  await db.collection('inventario').doc(productId).set({ costoUnitario: cost, updatedAt: serverNow() }, { merge:true });
  await db.collection('productos').doc(productId).set({ nombre: description, costoUnitario: cost, updatedAt: serverNow() }, { merge:true });
}

async function restoreInventoryFromItems(items, direction=1) {
  const batch = db.batch();
  (items || []).forEach(item => {
    if ((item.tipoProducto || item.tipo) !== 'Producto Venta') return;
    const id = item.productId || normalizeDocId(item.descripcion || item.nombre);
    const ref = db.collection('inventario').doc(id);
    batch.set(ref, {
      tipoProducto: 'Producto Venta',
      descripcion: item.descripcion || item.nombre,
      stock: FV.increment(direction * safeNumber(item.cantidad)),
      updatedAt: serverNow()
    }, { merge:true });
  });
  await batch.commit();
}

function getPaymentDistribution(method1, amount1, split, method2, amount2) {
  const payments = [];
  if (safeNumber(amount1) > 0) payments.push({ metodo: method1, monto: safeNumber(amount1) });
  if (split && safeNumber(amount2) > 0) payments.push({ metodo: method2, monto: safeNumber(amount2) });
  return payments;
}

async function deleteProductFromActiveCollections(productId, productName='') {
  const refs = new Map();
  const addRef = ref => refs.set(ref.path, ref);

  if (productId) {
    addRef(db.collection('inventario').doc(productId));
    addRef(db.collection('productos').doc(productId));
  }

  const normalizedId = normalizeDocId(productName);
  if (productName && normalizedId && normalizedId !== productId) {
    addRef(db.collection('inventario').doc(normalizedId));
    addRef(db.collection('productos').doc(normalizedId));
  }

  if (productName) {
    const [invSnap, prodSnap] = await Promise.all([
      db.collection('inventario').where('descripcion', '==', productName).get(),
      db.collection('productos').where('nombre', '==', productName).get()
    ]);
    invSnap.forEach(doc => addRef(doc.ref));
    prodSnap.forEach(doc => addRef(doc.ref));
  }

  const batch = db.batch();
  refs.forEach(ref => batch.delete(ref));
  await batch.commit();
}

  e.preventDefault();
  $('#loginMsg').textContent = 'Validando credenciales...';
  try {
    const email = $('#loginEmail').value.trim();
    const pass = $('#loginPassword').value;
    await auth.signInWithEmailAndPassword(email, pass);

auth.onAuthStateChanged(async user => {
  if (!user) {
    currentUser = null; currentRole = null; activeSection = null;
    cleanupActive();
    $('#app').classList.add('hidden');
    $('#loginScreen').classList.remove('hidden');
    initIcons();
    return;
  }
  try {
    const rolDoc = await db.collection('usuarios').doc(user.uid).get();
    if (!rolDoc.exists) {
      await auth.signOut();
      toast('Tu usuario no tiene rol asignado en Firestore.', 'error');
      return;
    }
    const data = rolDoc.data();
    currentUser = user;
    currentRole = data.rol === 'administrador' ? 'administrador' : 'trabajador';
    $('#userEmail').textContent = data.email || user.email || '';
    $('#userRole').textContent = currentRole;
    $('#loginScreen').classList.add('hidden');
    $('#app').classList.remove('hidden');
    renderNav();
    const first = currentRole === 'administrador' ? 'dashboard' : 'facturacion';
    navigate(first);
  } catch (err) {
    showError(err, 'No fue posible cargar el perfil de usuario');
    await auth.signOut();
  }
});

function renderNav() {
  $('#nav').innerHTML = SECTIONS.filter(s => s.roles.includes(currentRole)).map(s => `
    <button class="nav-btn" data-section="${s.id}" type="button"><i data-lucide="${s.icon}"></i>${s.label}</button>
  `).join('');
  $$('.nav-btn').forEach(btn => btn.addEventListener('click', () => navigate(btn.dataset.section)));
  initIcons();
}

function navigate(sectionId) {
  if (!canAccess(sectionId)) {
    toast('No tienes permisos para esta sección.', 'error');
    return;
  }
  cleanupActive();
  activeSection = sectionId;
  const meta = SECTIONS.find(s => s.id === sectionId);
  $('#pageTitle').textContent = meta.label;
  $('#pageKicker').textContent = currentRole === 'administrador' ? 'Administrador' : 'Trabajador';
  $$('.nav-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.section === sectionId));
  $('#sidebar').classList.remove('open');
  const renderer = SECTION_RENDERERS[sectionId];
  if (renderer) renderer();
}

   5. SECCIÓN: INGRESO DE COMPRAS
   ========================= */
function renderIngresoCompras() {
  let purchaseItems = [];
  let history = [];
  let nextNumber = 1;

  setContent(`
    ${sectionIntro('Ingreso de Compras', 'Registra compras por ítems bajo un mismo número correlativo.')}
    <div class="card">
      <div class="form-grid">
        <div class="field"><label>N° de Compra</label><input id="compraNumero" readonly value="Calculando..." /></div>
        <div class="field"><label>Tipo de Producto</label><select id="tipoProducto">${PRODUCT_TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div>
        <div class="field full">
          <label>Descripción del Producto</label>
          <input id="descripcionProducto" placeholder="Empieza a escribir para buscar en historial..." autocomplete="off" />
          <div id="purchaseSuggest" class="suggestions"></div>
        </div>
        <div class="field"><label>Cantidad</label><input id="cantidadCompra" type="number" min="0" step="0.01" /></div>
        <div class="field"><label>Tipo de Unidad</label><select id="unidadCompra">${UNITS.map(u=>`<option>${u}</option>`).join('')}</select></div>
        <div class="field"><label>Valor Total ($)</label><input id="valorTotalCompra" type="number" min="0" step="0.01" /></div>
        <div class="field"><label>Valor Unitario ($)</label><input id="valorUnitarioCompra" readonly /></div>
        <div class="field"><label>Fecha y Hora</label><input class="live-now" readonly /></div>
      </div>
      <div id="existingProductNotice" class="notice hidden" style="margin-top:14px"></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px">
        <button id="addPurchaseItem" class="btn btn-primary" type="button"><i data-lucide="plus"></i> Agregar ítem</button>
        <button id="savePurchase" class="btn btn-success" type="button"><i data-lucide="save"></i> Guardar compra</button>
      </div>
    </div>
    <div class="totalizer"><span>Total pre-compra</span><strong id="purchaseStageTotal">${money(0)}</strong></div>
    <div class="card"><div id="purchaseStageTable"></div></div>
  `);
  setupLiveClock($('#content'));

  const recalcUnit = () => {
    const qty = safeNumber($('#cantidadCompra').value);
    const total = parseMoney($('#valorTotalCompra').value);
    $('#valorUnitarioCompra').value = qty > 0 ? (total / qty).toFixed(2) : '';
  };
  $('#cantidadCompra').addEventListener('input', recalcUnit);
  $('#valorTotalCompra').addEventListener('input', recalcUnit);

  function getLatestByDesc(desc) {
    return history
      .filter(x => (x.descripcion || '').toLowerCase() === desc.toLowerCase())
      .sort((a,b) => (getDocDate(b) || 0) - (getDocDate(a) || 0))[0];
  }

  function updateNotice() {
    const desc = $('#descripcionProducto').value.trim();
    const latest = desc ? getLatestByDesc(desc) : null;
    const notice = $('#existingProductNotice');
    if (!latest) { notice.classList.add('hidden'); return; }
    notice.classList.remove('hidden');
    notice.innerHTML = `<b>Producto existente:</b> se encontró en historial. Última unidad: <b>${escapeHtml(latest.tipoUnidad || '')}</b> · Último costo unitario: <b>${money(latest.valorUnitario)}</b>. Puedes actualizar el precio con esta compra y se propagará al inventario.`;
  }

  function resetForm() {
    $('#descripcionProducto').value='';
    $('#cantidadCompra').value='';
    $('#valorTotalCompra').value='';
    $('#valorUnitarioCompra').value='';
    $('#existingProductNotice').classList.add('hidden');
    $('#tipoProducto').value='Producto Venta';
    $('#unidadCompra').value='Und';
  }

  function renderStage() {
    $('#purchaseStageTotal').textContent = money(purchaseItems.reduce((sum,it)=>sum+it.valorTotal,0));
    if (!purchaseItems.length) {
      $('#purchaseStageTable').innerHTML = emptyState('Agrega ítems antes de guardar la compra.');
      initIcons();
      return;
    }
    $('#purchaseStageTable').innerHTML = `
      <div class="table-wrap"><table>
        <thead><tr><th>Tipo</th><th>Descripción</th><th>Cantidad</th><th>Unidad</th><th>Total</th><th>Unitario</th><th></th></tr></thead>
        <tbody>${purchaseItems.map((it,idx)=>`
          <tr>
            <td><span class="pill">${escapeHtml(it.tipoProducto)}</span></td>
            <td>${escapeHtml(it.descripcion)}</td>
            <td>${it.cantidad}</td>
            <td>${escapeHtml(it.tipoUnidad)}</td>
            <td class="amount">${money(it.valorTotal)}</td>
            <td class="amount">${money(it.valorUnitario)}</td>
            <td><button class="btn btn-danger btn-sm" data-remove-purchase="${idx}" type="button"><i data-lucide="trash-2"></i> Eliminar</button></td>
          </tr>`).join('')}</tbody>
      </table></div>`;
    $$('[data-remove-purchase]').forEach(btn => btn.addEventListener('click', () => {
      purchaseItems.splice(Number(btn.dataset.removePurchase),1);
      renderStage();
    }));
    initIcons();
  }

  bindAutocomplete($('#descripcionProducto'), $('#purchaseSuggest'), () => history, x => x.descripcion || '', item => {
    $('#descripcionProducto').value = item.descripcion;
    $('#tipoProducto').value = item.tipoProducto || 'Producto Venta';
    $('#unidadCompra').value = item.tipoUnidad || 'Und';
    $('#valorUnitarioCompra').value = safeNumber(item.valorUnitario).toFixed(2);
    updateNotice();
  });

  $('#descripcionProducto').addEventListener('input', updateNotice);

  $('#addPurchaseItem').addEventListener('click', () => {
    const qty = safeNumber($('#cantidadCompra').value);
    const total = parseMoney($('#valorTotalCompra').value);
    const desc = $('#descripcionProducto').value.trim();
    if (!desc || qty <= 0 || total <= 0) {
      toast('Completa descripción, cantidad y valor total.', 'error'); return;
    }
    const item = {
      tipoProducto: $('#tipoProducto').value,
      descripcion: desc,
      cantidad: qty,
      tipoUnidad: $('#unidadCompra').value,
      valorTotal: total,
      valorUnitario: total / qty,
      productId: normalizeDocId(desc)
    };
    purchaseItems.push(item);
    resetForm();
    renderStage();
  });

  $('#savePurchase').addEventListener('click', async () => {
    if (!purchaseItems.length) { toast('No hay ítems para guardar.', 'error'); return; }
    try {
      const numero = nextNumber;
      const batch = db.batch();
      purchaseItems.forEach((it, idx) => {
        const ref = db.collection('compras').doc();
        batch.set(ref, { ...it, numeroCompra: numero, itemIndex: idx + 1, fecha: serverNow(), createdAt: serverNow(), creadoPor: currentUser.email });
        if (it.tipoProducto === 'Producto Venta') {
          const invRef = db.collection('inventario').doc(it.productId);
          batch.set(invRef, {
            tipoProducto: 'Producto Venta', descripcion: it.descripcion, tipoUnidad: it.tipoUnidad,
            stock: FV.increment(it.cantidad), costoUnitario: it.valorUnitario, updatedAt: serverNow()
          }, { merge:true });
          const prodRef = db.collection('productos').doc(it.productId);
          batch.set(prodRef, { nombre: it.descripcion, costoUnitario: it.valorUnitario, updatedAt: serverNow() }, { merge:true });
        }
      });
      await batch.commit();
      toast('Compra guardada');
      purchaseItems = [];
      resetForm();
      renderStage();
    } catch (err) { showError(err, 'No fue posible guardar la compra'); }
  });

  addUnsub(db.collection('compras').onSnapshot(snap => {
    history = snap.docs.map(doc => ({ id:doc.id, ...doc.data() }));
    const max = history.reduce((m,x)=>Math.max(m, safeNumber(x.numeroCompra)), 0);
    nextNumber = max + 1;
    $('#compraNumero').value = nextNumber;
  }));
  renderStage();
}

/* =========================
   6. SECCIÓN: HISTORIAL DE COMPRAS
   ========================= */
function renderHistorialCompras() {
  let purchases = [];
  setContent(`
    ${sectionIntro('Historial de Compras', 'Consulta, filtra y elimina compras registradas.')}
    <div class="card">${renderDateToolbar('historial-compras', true)}<div class="totalizer"><span>Total filtrado</span><strong id="totalCompras">${money(0)}</strong></div><div id="comprasTable"></div></div>
  `);
  const render = () => {
    const start = $('#filterStart').value;
    const end = $('#filterEnd').value;
    const type = $('#filterType').value;
    const filtered = purchases.filter(p => inDateRange(p,start,end) && (!type || p.tipoProducto === type));
    $('#totalCompras').textContent = money(filtered.reduce((s,p)=>s+safeNumber(p.valorTotal),0));
    if (!filtered.length) { $('#comprasTable').innerHTML = emptyState(); initIcons(); return; }
    $('#comprasTable').innerHTML = `<div class="table-wrap"><table>
      <thead><tr><th>Fecha</th><th>N°</th><th>Tipo</th><th>Descripción</th><th>Cant.</th><th>Unidad</th><th>Total</th><th>Unitario</th><th></th></tr></thead>
      <tbody>${filtered.map(p=>`
        <tr>
          <td>${localDateTime(getDocDate(p) || new Date())}</td>
          <td><b>${p.numeroCompra || '-'}</b></td>
          <td><span class="pill">${escapeHtml(p.tipoProducto)}</span></td>
          <td>${escapeHtml(p.descripcion)}</td>
          <td>${safeNumber(p.cantidad)}</td>
          <td>${escapeHtml(p.tipoUnidad || '')}</td>
          <td class="amount">${money(p.valorTotal)}</td>
          <td class="amount">${money(p.valorUnitario)}</td>
          <td><button class="btn btn-danger btn-sm" data-delete-purchase="${p.id}" type="button"><i data-lucide="trash-2"></i> Eliminar</button></td>
        </tr>`).join('')}</tbody></table></div>`;
    $$('[data-delete-purchase]').forEach(btn => btn.addEventListener('click', async () => {
      const item = purchases.find(p => p.id === btn.dataset.deletePurchase);
      if (!item || !confirmPassword()) { toast('Acción cancelada o contraseña incorrecta.', 'error'); return; }
      try {
        await db.collection('compras').doc(item.id).delete();
        if (item.tipoProducto === 'Producto Venta') {
          await restoreInventoryFromItems([item], -1);
          await recomputeProductCost(item.descripcion);
        }
        toast('Registro eliminado e inventario actualizado');
      } catch(err) { showError(err, 'No fue posible eliminar'); }
    }));
    initIcons();
  };
  bindDateFilterGuard('historial-compras', render);
  addUnsub(db.collection('compras').orderBy('createdAt','desc').onSnapshot(snap => {
    purchases = snap.docs.map(doc => ({ id:doc.id, ...doc.data() }));
    render();
  }));
}

function renderInventario() {
  setContent(`${sectionIntro('Inventario', 'Productos de venta, stock y valorización automática.')}<div class="card"><div id="inventoryTable"></div></div>`);
  addUnsub(db.collection('inventario').onSnapshot(snap => {
    const rows = snap.docs.map(doc => ({id:doc.id, ...doc.data()}))
      .filter(x => x.tipoProducto === 'Producto Venta')
      .sort((a,b)=>(a.descripcion||'').localeCompare(b.descripcion||''));
    const totalStock = rows.reduce((s,r)=>s+safeNumber(r.stock),0);
    const totalValue = rows.reduce((s,r)=>s+(safeNumber(r.stock)*safeNumber(r.costoUnitario)),0);
    if (!rows.length) { $('#inventoryTable').innerHTML = emptyState('Todavía no hay productos de venta en inventario.'); initIcons(); return; }
    $('#inventoryTable').innerHTML = `
      <div class="grid grid-2" style="margin-bottom:16px">
        <div class="card" style="box-shadow:none"><span class="muted">Stock total</span><h3>${totalStock}</h3></div>
        <div class="card" style="box-shadow:none"><span class="muted">Valor inventario</span><h3>${money(totalValue)}</h3></div>
      </div>
      <div class="table-wrap"><table><thead><tr><th>Tipo de Producto</th><th>Descripción</th><th>Stock</th><th>Valor $</th><th></th></tr></thead><tbody>
      ${rows.map(r=>`
        <tr>
          <td><span class="pill green">${escapeHtml(r.tipoProducto)}</span></td>
          <td>${escapeHtml(r.descripcion)}</td>
          <td><b>${safeNumber(r.stock)}</b> ${escapeHtml(r.tipoUnidad || '')}</td>
          <td class="amount">${money(safeNumber(r.stock)*safeNumber(r.costoUnitario))}</td>
          <td>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <button class="btn btn-warning btn-sm" data-adjust-stock="${r.id}" type="button"><i data-lucide="sliders-horizontal"></i> Ajustar</button>
              <button class="btn btn-danger btn-sm" data-delete-inventory-product="${r.id}" type="button"><i data-lucide="trash-2"></i> Eliminar</button>
            </div>
          </td>
        </tr>`).join('')}</tbody></table></div>`;
    $$('[data-adjust-stock]').forEach(btn => btn.addEventListener('click', async () => {
      const row = rows.find(r => r.id === btn.dataset.adjustStock);
      if (!row || !confirmPassword()) { toast('Contraseña incorrecta.', 'error'); return; }
      const value = prompt(`Nuevo stock para ${row.descripcion}:`, safeNumber(row.stock));
      if (value === null) return;
      const stock = safeNumber(value);
      try {
        await db.collection('inventario').doc(row.id).set({ stock, updatedAt: serverNow() }, { merge:true });
        toast('Inventario ajustado');
      } catch(err) { showError(err, 'No fue posible ajustar'); }
    }));

    // MEJORA #3
    $$('[data-delete-inventory-product]').forEach(btn => btn.addEventListener('click', async () => {
      const row = rows.find(r => r.id === btn.dataset.deleteInventoryProduct);
      if (!row) return;
      if (!confirm(`¿Eliminar "${row.descripcion}" de Inventario y Productos?`)) return;
      try {
        await deleteProductFromActiveCollections(row.id, row.descripcion);
        toast('Producto eliminado de Inventario y Productos');
      } catch(err) { showError(err, 'No fue posible eliminar el producto'); }
    }));

    initIcons();
  }));
}

/* =========================
   8. SECCIÓN: PRODUCTOS
   ========================= */
function renderProductos() {
  let inventory = [];
  let productDocs = {};
  let saveTimers = {};
  setContent(`${sectionIntro('Productos', 'Define PVP y controla márgenes desde el inventario.')}<div class="card"><div id="productsTable"></div></div>`);

  const savePvp = async (id, value, rowEl) => {
    try {
      await db.collection('productos').doc(id).set({ pvp: safeNumber(value), updatedAt: serverNow() }, { merge:true });
      const check = rowEl?.querySelector('.check-save');
      if (check) { check.classList.add('show'); setTimeout(()=>check.classList.remove('show'), 1200); }
    } catch(err) { showError(err, 'No fue posible guardar el PVP'); }
  };

  const render = () => {
    const rows = inventory.filter(x => x.tipoProducto === 'Producto Venta').sort((a,b)=>(a.descripcion||'').localeCompare(b.descripcion||''));
    if (!rows.length) { $('#productsTable').innerHTML = emptyState('Los productos aparecen cuando existan en inventario.'); initIcons(); return; }
    $('#productsTable').innerHTML = `<div class="table-wrap"><table>
      <thead><tr><th>Nombre del Producto</th><th>Costo Unitario</th><th>PVP</th><th>Margen $</th><th>Margen %</th><th></th></tr></thead>
      <tbody>${rows.map(r=>{
        const prod = productDocs[r.id] || {};
        const costo = safeNumber(r.costoUnitario);
        const pvp = safeNumber(prod.pvp);
        const margen = pvp - costo;
        // MEJORA #5
        const pct = pvp > 0 ? ((pvp - costo) / pvp) * 100 : 0;
        return `<tr data-product-row="${r.id}">
          <td>${escapeHtml(r.descripcion)}</td>
          <td class="amount">${money(costo)}</td>
          <td><div style="display:flex;align-items:center;gap:8px"><input class="pvp-input" data-id="${r.id}" data-costo="${costo}" value="${pvp || ''}" type="number" min="0" step="0.01" placeholder="0" style="max-width:160px" /><span class="check-save">✓</span></div></td>
          <td class="amount margin-money">${money(margen)}</td>
          <td class="amount margin-pct">${pct.toFixed(2)}%</td>
          <td><button class="btn btn-danger btn-sm" data-delete-product="${r.id}" type="button"><i data-lucide="trash-2"></i> Eliminar</button></td>
        </tr>`;
      }).join('')}</tbody></table></div>`;
    $$('.pvp-input').forEach(input => {
      const row = input.closest('tr');
      const updateMargins = () => {
        const pvp = safeNumber(input.value);
        const costo = safeNumber(input.dataset.costo);
        const margen = pvp - costo;
        row.querySelector('.margin-money').textContent = money(margen);
        // MEJORA #5
        row.querySelector('.margin-pct').textContent = pvp > 0 ? (((pvp - costo) / pvp) * 100).toFixed(2) + '%' : '0.00%';
      };
      input.addEventListener('input', () => {
        updateMargins();
        clearTimeout(saveTimers[input.dataset.id]);
        saveTimers[input.dataset.id] = setTimeout(() => savePvp(input.dataset.id, input.value, row), 800);
      });
      input.addEventListener('blur', () => savePvp(input.dataset.id, input.value, row));
    });

    // MEJORA #4
    $$('[data-delete-product]').forEach(btn => btn.addEventListener('click', async () => {
      const row = rows.find(r => r.id === btn.dataset.deleteProduct);
      if (!row) return;
      if (!confirm(`¿Eliminar "${row.descripcion}" de Productos e Inventario?`)) return;
      try {
        await deleteProductFromActiveCollections(row.id, row.descripcion);
        toast('Producto eliminado de Productos e Inventario');
      } catch(err) { showError(err, 'No fue posible eliminar el producto'); }
    }));
    initIcons();
  };

  addUnsub(db.collection('inventario').onSnapshot(snap => { inventory = snap.docs.map(doc => ({ id:doc.id, ...doc.data() })); render(); }));
  addUnsub(db.collection('productos').onSnapshot(snap => { productDocs = {}; snap.forEach(doc => productDocs[doc.id] = doc.data()); render(); }));
}

function renderClientes() {
  let editingId = null;
  let clients = [];
  setContent(`
    ${sectionIntro('Clientes', 'Crea y administra la base de clientes.')}
    <div class="card">
      <div class="form-grid">
        <div class="field"><label>Nombre</label><input id="clientName" /></div>
        <div class="field"><label>Cédula</label><input id="clientCedula" /></div>
        <div class="field"><label>Celular</label><input id="clientPhone" /></div>

      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px">
        <button id="saveClient" class="btn btn-primary" type="button"><i data-lucide="save"></i> Guardar cliente</button>
        <button id="cancelClientEdit" class="btn btn-soft hidden" type="button">Cancelar edición</button>
      </div>
    </div>
    <div class="card" style="margin-top:16px">
      <div class="toolbar">
        <div class="field" style="min-width:min(100%,360px)">

        </div>
      </div>
      <div id="clientsTable"></div>
    </div>

  const clear = () => { editingId=null; $('#clientName').value=''; $('#clientCedula').value=''; $('#clientPhone').value=''; $('#clientNote').value=''; $('#saveClient').innerHTML='<i data-lucide="save"></i> Guardar cliente'; $('#cancelClientEdit').classList.add('hidden'); initIcons(); };
  $('#cancelClientEdit').addEventListener('click', clear);
  $('#saveClient').addEventListener('click', async () => {
    const nombre = $('#clientName').value.trim();
    if (!nombre) { toast('El nombre es obligatorio.', 'error'); return; }
    const data = { nombre, cedula: $('#clientCedula').value.trim(), celular: $('#clientPhone').value.trim(), nota: $('#clientNote').value.trim(), updatedAt: serverNow() };
    try {
      if (editingId) await db.collection('clientes').doc(editingId).set(data, {merge:true});
      else await db.collection('clientes').add({ ...data, createdAt: serverNow() });
      toast(editingId ? 'Cliente actualizado' : 'Cliente creado');
      clear();
    } catch(err) { showError(err, 'No fue posible guardar el cliente'); }
  });

  // MEJORA #2
  const renderClientsTable = () => {
    const search = normalizeSearchText($('#clientSearch')?.value || '');
    const filtered = clients.filter(c => {
      const haystack = normalizeSearchText(`${c.nombre || ''} ${c.cedula || ''}`);
      return !search || haystack.includes(search);
    });

    if (!filtered.length) {
      $('#clientsTable').innerHTML = emptyState(clients.length ? 'No hay clientes que coincidan con la búsqueda.' : 'No hay clientes registrados.');
      initIcons();
      return;
    }

    $('#clientsTable').innerHTML = `<div class="table-wrap"><table><thead><tr><th>Nombre</th><th>Cédula</th><th>Celular</th><th>Nota</th><th></th></tr></thead><tbody>
      ${filtered.map(c=>`<tr><td><b>${escapeHtml(c.nombre)}</b></td><td>${escapeHtml(c.cedula||'-')}</td><td>${escapeHtml(c.celular||'-')}</td><td>${escapeHtml(c.nota||'-')}</td><td style="display:flex;gap:8px"><button class="btn btn-soft btn-sm" data-edit-client="${c.id}" type="button"><i data-lucide="pencil"></i> Editar</button><button class="btn btn-danger btn-sm" data-delete-client="${c.id}" type="button"><i data-lucide="trash-2"></i> Eliminar</button></td></tr>`).join('')}
    </tbody></table></div>`;
    $$('[data-edit-client]').forEach(btn => btn.addEventListener('click', () => {
      const c = clients.find(x => x.id === btn.dataset.editClient);
      if (!c) return;
      editingId = c.id;
      $('#clientName').value = c.nombre || '';
      $('#clientCedula').value = c.cedula || '';
      $('#clientPhone').value = c.celular || '';
      $('#clientNote').value = c.nota || '';
      $('#saveClient').innerHTML='<i data-lucide="save"></i> Actualizar cliente';
      $('#cancelClientEdit').classList.remove('hidden');
      initIcons();
    }));
    $$('[data-delete-client]').forEach(btn => btn.addEventListener('click', async () => {
      if (!confirm('¿Eliminar este cliente?')) return;
      try { await db.collection('clientes').doc(btn.dataset.deleteClient).delete(); toast('Cliente eliminado'); }
      catch(err) { showError(err, 'No fue posible eliminar'); }
    }));
    initIcons();
  };

  $('#clientSearch').addEventListener('input', renderClientsTable);
  addUnsub(db.collection('clientes').onSnapshot(snap => {
    clients = snap.docs.map(doc => ({id:doc.id, ...doc.data()})).sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));
    renderClientsTable();
  }));
}

/* =========================
   12. SECCIÓN: FACTURACIÓN
   ========================= */
function renderFacturacion() {
  let clients = [];
  let products = [];
  let inventoryProducts = [];
  let productPvpMap = {};
  let items = [];
  let nextInvoice = 1;

  setContent(`
    ${sectionIntro('Facturación', 'Factura productos, registra pagos y genera cartera cuando corresponda.')}
    <div class="card">
      <div class="form-grid">
        <div class="field"><label>N° de Factura</label><input id="invoiceNumber" readonly value="Calculando..." /></div>
        <div class="field">
          <label>Nombre del Cliente</label><input id="invoiceClient" value="General" autocomplete="off" />
          <div id="clientSuggest" class="suggestions"></div>
        </div>
        <div class="field">
          <label>Producto</label><input id="invoiceProduct" autocomplete="off" placeholder="Buscar producto..." />
          <div id="productSuggest" class="suggestions"></div>
        </div>
        <div class="field"><label>Cantidad</label><input id="invoiceQty" type="number" min="0" step="0.01" /></div>
        <div class="field"><label>PVP Unitario</label><input id="invoicePvp" readonly /></div>
        <div class="field"><label>Total ítem</label><input id="invoiceItemTotal" readonly /></div>
        <div class="field"><label>Forma de Pago</label><select id="invoicePayment1">${PAYMENT_METHODS.map(p=>`<option>${p}</option>`).join('')}</select></div>
        <div class="field"><label>Monto Recibido</label><input id="invoiceReceived1" type="number" min="0" step="0.01" placeholder="Vacío = cartera" /></div>
        <div class="field"><label>Pago Dividido</label><label class="pill" style="justify-content:center"><input id="invoiceSplit" type="checkbox" style="width:auto" /> Activar segundo pago</label></div>
        <div class="field split-invoice hidden"><label>Segundo método</label><select id="invoicePayment2">${PAYMENT_METHODS.map(p=>`<option>${p}</option>`).join('')}</select></div>
        <div class="field split-invoice hidden"><label>Monto segundo método</label><input id="invoiceReceived2" type="number" min="0" step="0.01" /></div>
        <div class="field"><label>Fecha y Hora</label><input class="live-now" readonly /></div>
        <div class="field"><label>Valor a Devolver / Pendiente</label><input id="invoiceChange" readonly /></div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px">
        <button id="addInvoiceItem" class="btn btn-primary" type="button"><i data-lucide="plus"></i> Agregar ítem</button>
        <button id="saveInvoice" class="btn btn-success" type="button"><i data-lucide="save"></i> Guardar venta</button>
      </div>
    </div>
    <div class="totalizer"><span>Total venta</span><strong id="invoiceTotal">${money(0)}</strong></div>
    <div class="card"><div id="invoiceItemsTable"></div></div>
  `);
  setupLiveClock($('#content'));

  let selectedClient = { nombre:'General', id:null };
  let selectedProduct = null;

  function mergeInvoiceProducts() {
    products = inventoryProducts.map(x => ({
      ...x, nombre: x.descripcion, pvp: safeNumber(productPvpMap[x.id]?.pvp), costoUnitario: safeNumber(x.costoUnitario)
    }));
  }

  function saleTotal() { return items.reduce((s,it)=>s + safeNumber(it.total), 0); }
  function updateMoneyFields() {
    const qty = safeNumber($('#invoiceQty').value);
    const pvp = safeNumber($('#invoicePvp').value);
    $('#invoiceItemTotal').value = qty > 0 && pvp >= 0 ? (qty*pvp).toFixed(2) : '';
    const received1Raw = $('#invoiceReceived1').value;
    const received1 = received1Raw === '' ? 0 : safeNumber(received1Raw);
    const received2 = $('#invoiceSplit').checked ? safeNumber($('#invoiceReceived2').value) : 0;
    const diff = received1 + received2 - saleTotal();
    $('#invoiceChange').value = diff >= 0 ? `Devuelve ${money(diff)}` : `Pendiente ${money(Math.abs(diff))}`;
  }
  ['invoiceQty','invoiceReceived1','invoiceReceived2'].forEach(id => $('#' + id).addEventListener('input', updateMoneyFields));
  $('#invoiceSplit').addEventListener('change', () => { $$('.split-invoice').forEach(el=>el.classList.toggle('hidden', !$('#invoiceSplit').checked)); updateMoneyFields(); });

  function renderItems() {
    $('#invoiceTotal').textContent = money(saleTotal());
    updateMoneyFields();
    if (!items.length) { $('#invoiceItemsTable').innerHTML = emptyState('Agrega productos a la factura.'); initIcons(); return; }
    $('#invoiceItemsTable').innerHTML = `<div class="table-wrap"><table><thead><tr><th>Producto</th><th>Cantidad</th><th>PVP</th><th>Total</th><th></th></tr></thead><tbody>
      ${items.map((it,idx)=>`<tr><td>${escapeHtml(it.descripcion)}</td><td>${it.cantidad}</td><td>${money(it.pvpUnitario)}</td><td class="amount">${money(it.total)}</td><td><button class="btn btn-danger btn-sm" data-remove-invoice-item="${idx}" type="button"><i data-lucide="trash-2"></i> Eliminar</button></td></tr>`).join('')}
    </tbody></table></div>`;
    $$('[data-remove-invoice-item]').forEach(btn => btn.addEventListener('click', () => { items.splice(Number(btn.dataset.removeInvoiceItem),1); renderItems(); }));
    initIcons();
  }
  function clearProductForm() { selectedProduct=null; $('#invoiceProduct').value=''; $('#invoiceQty').value=''; $('#invoicePvp').value=''; $('#invoiceItemTotal').value=''; }

  bindAutocomplete($('#invoiceClient'), $('#clientSuggest'), () => clients, x => x.nombre || '', c => { selectedClient = c; $('#invoiceClient').value = c.nombre; });
  bindAutocomplete($('#invoiceProduct'), $('#productSuggest'), () => products, x => x.descripcion || x.nombre || '', p => {
    selectedProduct = p;
    $('#invoiceProduct').value = p.descripcion || p.nombre;
    $('#invoicePvp').value = safeNumber(p.pvp).toFixed(2);
    updateMoneyFields();
  });

  $('#addInvoiceItem').addEventListener('click', () => {
    const desc = $('#invoiceProduct').value.trim();
    const p = selectedProduct || products.find(x => (x.descripcion || x.nombre || '').toLowerCase() === desc.toLowerCase());
    const qty = safeNumber($('#invoiceQty').value);
    const pvp = safeNumber($('#invoicePvp').value);
    if (!p || !desc || qty <= 0 || pvp <= 0) { toast('Selecciona producto, cantidad y PVP válido.', 'error'); return; }
    items.push({
      productId: p.id, descripcion: p.descripcion || p.nombre, cantidad: qty,
      pvpUnitario: pvp, costoUnitario: safeNumber(p.costoUnitario), total: qty * pvp,
      tipoProducto: 'Producto Venta'
    });
    clearProductForm();
    renderItems();
  });

  $('#saveInvoice').addEventListener('click', async () => {
    if (!items.length) { toast('No hay ítems para guardar.', 'error'); return; }
    try {
      const total = saleTotal();
      const received1Empty = $('#invoiceReceived1').value === '';
      const amount1 = received1Empty ? 0 : safeNumber($('#invoiceReceived1').value);
      const amount2 = $('#invoiceSplit').checked ? safeNumber($('#invoiceReceived2').value) : 0;
      const totalReceived = amount1 + amount2;
      const paid = Math.min(totalReceived, total);
      const debt = Math.max(total - totalReceived, 0);
      const payments = getPaymentDistribution($('#invoicePayment1').value, amount1, $('#invoiceSplit').checked, $('#invoicePayment2').value, amount2);
      const clienteNombre = $('#invoiceClient').value.trim() || 'General';
      const facturaNumero = nextInvoice;
      const batch = db.batch();
      const invoiceRef = db.collection('facturas').doc();

      batch.set(invoiceRef, {
        facturaNumero, clienteNombre, clienteId: selectedClient?.id || null, items,
        totalFactura: total, totalRecibido: totalReceived, totalPagado: paid, saldoPendiente: debt,
        formaPago: $('#invoicePayment1').value, pagoDividido: $('#invoiceSplit').checked, pagos: payments,
        fecha: serverNow(), createdAt: serverNow(), creadoPor: currentUser.email
      });

      items.forEach(it => {
        const invRef = db.collection('inventario').doc(it.productId);
        batch.set(invRef, { stock: FV.increment(-safeNumber(it.cantidad)), updatedAt: serverNow() }, { merge:true });
      });

      if (paid > 0) {
        const saleRef = db.collection('ventas').doc();
        batch.set(saleRef, {
          facturaNumero, facturaId: invoiceRef.id, clienteNombre, clienteId: selectedClient?.id || null, items,

function calculateExitDate(service, base = new Date()) {
  if (!service) return null;
  if (service.tipoTiempo === 'duracion') return new Date(base.getTime() + safeNumber(service.horas) * 60 * 60 * 1000);
  if (service.tipoTiempo === 'horaFija' && service.horaSalida) {
    const [h,m] = service.horaSalida.split(':').map(Number);
    const d = new Date(base);
    d.setHours(h || 0, m || 0, 0, 0);
    if (d <= base) d.setDate(d.getDate() + 1);
    return d;
  }
  return null;
}

function roomStatus(room) {
  if (room.estado !== 'ocupada') return {cls:'free', label:'Libre'};
  const exit = room.estadiaActiva?.expiresAt?.toDate ? room.estadiaActiva.expiresAt.toDate() : (room.estadiaActiva?.expiresAt ? new Date(room.estadiaActiva.expiresAt) : null);
  if (!exit) return {cls:'busy', label:'Ocupada'};
  const mins = Math.round((exit - new Date()) / 60000);
  if (mins <= 15) return {cls:'alert', label: mins <= 0 ? 'Salida vencida' : 'Próxima salida'};
  return {cls:'busy', label:'Ocupada'};
}

function formatRemaining(room) {
  if (room.estado !== 'ocupada') return 'Disponible';
  const exit = room.estadiaActiva?.expiresAt?.toDate ? room.estadiaActiva.expiresAt.toDate() : (room.estadiaActiva?.expiresAt ? new Date(room.estadiaActiva.expiresAt) : null);
  if (!exit) return 'Sin hora de salida';
  const diff = exit - new Date();
  if (diff <= 0) return `Vencido desde ${localDateTime(exit)}`;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  return `${h}h ${m}m restantes`;
}

          clienteNombre, clienteId: stay.clienteId || null, cedula,

          origen:'renovacion-hospedaje', servicioId: service.id, habitacionId: room.id, habitacionNombre: room.nombre,
          registroId: registroRef.id, fecha: serverNow(), createdAt: serverNow()
        });
      }

      batch.set(roomRef, {
        estado:'ocupada', updatedAt: serverNow(),
        estadiaActiva: {
          clienteNombre, clienteId: stay.clienteId || null, cedula, servicioId: service.id,
          // MEJORA ACOMPAÑANTES
          acompanantes,
          servicioDescripcion: service.descripcion, valor: total, checkIn: serverNow(), expiresAt: firebase.firestore.Timestamp.fromDate(exit),
          tipoTiempo: service.tipoTiempo, horas: service.horas || null, horaSalida: service.horaSalida || null,
          registroId: registroRef.id, renovadaAt: serverNow()
        }
      }, { merge:true });

      await batch.commit();
      closeModal();
      toast('Renovación registrada y habitación actualizada');
    } catch(err) { showError(err, 'No fue posible confirmar la renovación'); }
  });

  calcRenewal();
}

    $('#guestChange').value = diff >= 0 ? `Devuelve ${money(diff)}` : `Pendiente ${money(Math.abs(diff))}`;

      const amount2 = $('#guestSplit').checked ? safeNumber($('#guestReceived2').value) : 0;

      const debt = Math.max(total - received, 0);

      const exit = calculateExitDate(service, new Date());

        });

      // MEJORA ACOMPAÑANTES: no se agrega el array a Cartera; la deuda pertenece solo al titular.
      if (debt > 0 || received <= 0) {
        const debtRef = db.collection('cartera').doc();
        batch.set(debtRef, {
          clienteNombre, clienteId: selectedClient?.id || null, cedula: $('#guestCedula').value.trim(), descripcion: service.descripcion,
          valorPendiente: debt > 0 ? debt : total, valorOriginal: total, origen:'hospedaje', servicioId: service.id,
          habitacionId: room.id, habitacionNombre: room.nombre, fecha: serverNow(), createdAt: serverNow()
        });
      }
      batch.set(roomRef, {
        estado:'ocupada', updatedAt: serverNow(),
        estadiaActiva: {
          clienteNombre, clienteId: selectedClient?.id || null, cedula: $('#guestCedula').value.trim(), servicioId: service.id,
          // MEJORA ACOMPAÑANTES
          acompanantes,
          servicioDescripcion: service.descripcion, valor: total, checkIn: serverNow(), expiresAt: firebase.firestore.Timestamp.fromDate(exit),
          tipoTiempo: service.tipoTiempo, horas: service.horas || null, horaSalida: service.horaSalida || null, registroId: registroRef?.id || null
        }
      }, { merge:true });
      await batch.commit();
      toast('Registro guardado');
      $('#guestName').value=''; $('#guestCedula').value=''; $('#guestService').value=''; $('#guestRoom').value=''; $('#guestReceived1').value=''; $('#guestReceived2').value=''; $('#guestSplit').checked=false; $$('.split-guest').forEach(el=>el.classList.add('hidden'));

      // MEJORA ACOMPAÑANTES
      $('#guestHasCompanions').checked = false;
      $('#guestCompanionsPanel').classList.add('hidden');

      calc();
    } catch(err) { showError(err, 'No fue posible guardar el registro'); }
  });

  addUnsub(db.collection('clientes').onSnapshot(snap => { clients = snap.docs.map(doc => ({id:doc.id,...doc.data()})); }));
  addUnsub(db.collection('servicios').onSnapshot(snap => { services = snap.docs.map(doc => ({id:doc.id,...doc.data()})); updateSelects(); calc(); }));
  addUnsub(db.collection('habitaciones').onSnapshot(snap => { rooms = snap.docs.map(doc => ({id:doc.id,...doc.data()})); updateSelects(); }));

}

async function registerDebtPayment(debt, amount, method) {
  const pay = Math.min(safeNumber(amount), safeNumber(debt.valorPendiente));
  if (pay <= 0) throw new Error('El valor del abono debe ser mayor a cero.');
  const batch = db.batch();
  const debtRef = db.collection('cartera').doc(debt.id);
  const remaining = safeNumber(debt.valorPendiente) - pay;
  if (debt.origen === 'facturacion') {
    const saleRef = db.collection('ventas').doc();
    batch.set(saleRef, {
      tipo:'abono', isAbono:true, facturaNumero: debt.facturaNumero || null,
      clienteNombre: debt.clienteNombre, clienteId: debt.clienteId || null, cedula: debt.cedula || '',
      descripcion: `Abono cartera: ${debt.descripcion || ''}`,
      totalFactura: pay, totalPagado: pay, valor: pay, formaPago: method,
      pagos:[{ metodo: method, monto: pay }], fecha: serverNow(), createdAt: serverNow(), origen:'abono-cartera', creadoPor: currentUser.email
    });
  } else {
    const regRef = db.collection('registros').doc();
    batch.set(regRef, {
      tipo:'abono', isAbono:true, clienteNombre: debt.clienteNombre, clienteId: debt.clienteId || null, cedula: debt.cedula || '',
      descripcion: `Abono cartera: ${debt.descripcion || ''}`, servicioDescripcion: debt.descripcion || 'Abono hospedaje',
      habitacionId: debt.habitacionId || null, habitacionNombre: debt.habitacionNombre || null,
      valorTotal: pay, valorPagado: pay, valor: pay, formaPago: method,
      pagos:[{ metodo: method, monto: pay }], fecha: serverNow(), createdAt: serverNow(), origen:'abono-cartera', creadoPor: currentUser.email
    });
  }
  if (remaining <= 0.0001) batch.delete(debtRef);
  else batch.set(debtRef, { valorPendiente: remaining, updatedAt: serverNow() }, {merge:true});
  await batch.commit();
}

function renderCartera() {
  let debts = [];
  let clients = [];
  setContent(`
    ${sectionIntro('Cartera', 'Saldos pendientes originados en facturación o hospedaje.')}

      <div class="toolbar">

        </div>
      </div>
      <div id="walletTable"></div>
    </div>
  `);

  const getDebtCedula = debt => {
    if (debt.cedula) return debt.cedula;
    const client = clients.find(c => c.id === debt.clienteId);
    return client?.cedula || '';
  };

  // MEJORA 3: búsqueda por apellido y por nombre/apellido en cualquier orden.
  const render = () => {
    const searchTerms = normalizeSearchText($('#walletSearch')?.value || '')
      .split(/\s+/)
      .filter(Boolean);

    const filtered = debts.filter(d => {
      const cedula = getDebtCedula(d);
      const haystack = normalizeSearchText(`${d.clienteNombre || ''} ${cedula}`);
      return !searchTerms.length || searchTerms.every(term => haystack.includes(term));
    });
    const total = filtered.reduce((s,d)=>s+safeNumber(d.valorPendiente),0);

    if (!filtered.length) {
      $('#walletTable').innerHTML = `<div class="totalizer"><span>Total pendiente</span><strong>${money(0)}</strong></div>${emptyState(debts.length ? 'No hay deudas que coincidan con la búsqueda.' : 'No hay deudas pendientes.')}`;
      initIcons();
      return;
    }

    $('#walletTable').innerHTML = `<div class="totalizer"><span>Total pendiente</span><strong>${money(total)}</strong></div><div class="table-wrap"><table><thead><tr><th>Cliente</th><th>Cédula</th><th>Descripción</th><th>Origen</th><th>Valor pendiente</th><th>Fecha origen</th><th></th></tr></thead><tbody>
      ${filtered.map(d=>`<tr><td><b>${escapeHtml(d.clienteNombre)}</b></td><td>${escapeHtml(getDebtCedula(d) || '-')}</td><td>${escapeHtml(d.descripcion)}</td><td><span class="pill">${escapeHtml(d.origen)}</span></td><td class="amount">${money(d.valorPendiente)}</td><td>${localDateTime(getDocDate(d)||new Date())}</td><td style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-soft btn-sm" data-pay-debt="${d.id}" type="button"><i data-lucide="badge-dollar-sign"></i> Abonar</button><button class="btn btn-success btn-sm" data-settle-debt="${d.id}" type="button"><i data-lucide="check-check"></i> Saldar</button><button class="btn btn-danger btn-sm" data-delete-debt="${d.id}" type="button"><i data-lucide="trash-2"></i> Eliminar deuda</button></td></tr>`).join('')}
    </tbody></table></div>`;
    $$('[data-pay-debt]').forEach(btn => btn.addEventListener('click', async () => {
      const d = debts.find(x => x.id === btn.dataset.payDebt); if (!d) return;
      const val = prompt(`Valor del abono para ${d.clienteNombre}:`, ''); if (val === null) return;
      const method = prompt('Forma de pago (Efectivo, Nequi, Transferencia, Tarjeta):', 'Efectivo') || 'Efectivo';
      try { await registerDebtPayment(d, safeNumber(val), method); toast('Abono registrado'); }
      catch(err) { showError(err, 'No fue posible registrar abono'); }
    }));
    $$('[data-settle-debt]').forEach(btn => btn.addEventListener('click', async () => {
      const d = debts.find(x => x.id === btn.dataset.settleDebt); if (!d) return;
      const method = prompt('Forma de pago para saldar:', 'Efectivo') || 'Efectivo';
      try { await registerDebtPayment(d, safeNumber(d.valorPendiente), method); toast('Deuda saldada'); }
      catch(err) { showError(err, 'No fue posible saldar'); }
    }));
    $$('[data-delete-debt]').forEach(btn => btn.addEventListener('click', async () => {
      if (!confirmPassword()) { toast('Contraseña incorrecta.', 'error'); return; }
      try { await db.collection('cartera').doc(btn.dataset.deleteDebt).delete(); toast('Deuda eliminada sin generar ingreso'); }
      catch(err) { showError(err, 'No fue posible eliminar'); }
    }));
    initIcons();
  };

  $('#walletSearch').addEventListener('input', render);
  addUnsub(db.collection('clientes').onSnapshot(snap => { clients = snap.docs.map(doc => ({id:doc.id,...doc.data()})); render(); }));
  addUnsub(db.collection('cartera').orderBy('createdAt','desc').onSnapshot(snap => { debts = snap.docs.map(doc => ({id:doc.id,...doc.data()})); render(); }));
}
