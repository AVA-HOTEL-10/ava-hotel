    if (barCtx) chartInstances.bar = new Chart(barCtx, { type:'bar', data:{ labels:['Ventas','Compras','Gastos'], datasets:[{ label:'Valor', data:barValues }] }, options:{ responsive:true, plugins:{ legend:{display:false} } } });
    if (doughnutCtx) chartInstances.pay = new Chart(doughnutCtx, { type:'doughnut', data:{ labels:Object.keys(paymentMap), datasets:[{ data:Object.values(paymentMap) }] }, options:{ responsive:true } });
    if (lineCtx) chartInstances.line = new Chart(lineCtx, { type:'line', data:{ labels:['Actual','Proyección','Meta'], datasets:[{ label:'Proyección vs Meta', data:[barValues[0], projection, goal], tension:.35 }] }, options:{ responsive:true } });
  }

  const render = () => {
    const start = $('#filterStart').value;
    const end = $('#filterEnd').value;
    const ventasF = ventas.filter(v => inDateRange(v,start,end));
    const comprasF = compras.filter(c => inDateRange(c,start,end));
    const gastosF = gastos.filter(g => inDateRange(g,start,end));
    const registrosF = registros.filter(r => inDateRange(r,start,end));

    const totalVentas = ventasF.reduce((s,v)=>s+safeNumber(v.valor || v.totalPagado),0);
    const totalCompras = comprasF.reduce((s,c)=>s+safeNumber(c.valorTotal),0);
    const totalGastos = gastosF.reduce((s,g)=>s+safeNumber(g.valor),0);
    const ingresosEstadia = registrosF.reduce((s,r)=>s+safeNumber(r.valor || r.valorPagado),0);
    const utilidad = ingresosEstadia + totalVentas - totalCompras - totalGastos;
    const goal = safeNumber(metaDoc.metaMensual || metaDoc.valor || 0);
    const goalBase = ingresosEstadia + totalVentas;
    const pctGoal = goal > 0 ? Math.min((goalBase / goal) * 100, 999) : 0;
    $('#monthlyGoal').value = goal || '';
    $('#goalProgress').style.width = Math.min(pctGoal,100).toFixed(2) + '%';
    $('#goalText').textContent = goal > 0 ? `${pctGoal.toFixed(2)}% alcanzado · ${money(goalBase)} de ${money(goal)}` : 'Ingresa una meta para visualizar el progreso.';

    const units = ventasF.filter(v=>!v.isAbono).flatMap(v=>v.items || []).reduce((s,it)=>s+safeNumber(it.cantidad),0);
    const invoices = new Set(ventasF.filter(v=>v.facturaNumero).map(v=>v.facturaNumero)).size || ventasF.length;
    const upt = invoices ? units / invoices : 0;
    const vpt = invoices ? totalVentas / invoices : 0;
    const vpu = units ? totalVentas / units : 0;

    const selectedEnd = new Date(end + 'T12:00:00');
    const day = Math.max(1, selectedEnd.getDate());
    const projection = (totalVentas / day) * daysInMonth(selectedEnd);

    const serviceMap = {};
    registrosF.forEach(r => { const key = r.servicioDescripcion || r.descripcion || 'Sin servicio'; serviceMap[key] = (serviceMap[key] || 0) + safeNumber(r.valor || r.valorPagado); });
    const topServices = Object.entries(serviceMap).sort((a,b)=>b[1]-a[1]).slice(0,5);

    const productUnits = {}, productProfit = {}, productSales = {}, clientSales = {};
    ventasF.forEach(v => {
      clientSales[v.clienteNombre || 'General'] = (clientSales[v.clienteNombre || 'General'] || 0) + safeNumber(v.valor || v.totalPagado);
      if (v.isAbono) return;
      (v.items || []).forEach(it => {
        const key = it.descripcion || 'Producto';
        productUnits[key] = (productUnits[key] || 0) + safeNumber(it.cantidad);
        productSales[key] = (productSales[key] || 0) + safeNumber(it.total);
        productProfit[key] = (productProfit[key] || 0) + ((safeNumber(it.pvpUnitario) - safeNumber(it.costoUnitario)) * safeNumber(it.cantidad));
      });
    });
    const invValue = inventario.reduce((s,i)=>s+safeNumber(i.stock)*safeNumber(i.costoUnitario),0);
    const invQty = inventario.reduce((s,i)=>s+safeNumber(i.stock),0);

    $('#dashboardRoot').innerHTML = `
      <div class="grid grid-4">
        ${metricCard('Ingresos de estadía', ingresosEstadia, 'bed-double')}
        ${metricCard('Total Ventas', totalVentas, 'trending-up')}
        ${metricCard('Total Compras', totalCompras, 'shopping-bag')}
        ${metricCard('Total Gastos', totalGastos, 'wallet')}
      </div>
      <div class="grid grid-4" style="margin-top:16px">
        ${metricCard('Utilidad Neta', utilidad, 'badge-dollar-sign')}
        ${metricCard('Valor inventario', invValue, 'boxes')}
        ${metricCard('Stock total', invQty, 'package')}
        ${metricCard('Proyección ventas', projection, 'chart-line')}
      </div>
      <div class="grid grid-3" style="margin-top:16px">
        <div class="card"><h3>Ventas vs Compras vs Gastos</h3><canvas id="barChart"></canvas></div>
        <div class="card"><h3>Formas de Pago</h3><canvas id="paymentChart"></canvas></div>
        <div class="card"><h3>Proyección vs Meta</h3><canvas id="projectionChart"></canvas></div>
      </div>
      <div class="grid grid-2" style="margin-top:16px">
        ${simpleTable('5 servicios más rentables', ['Servicio','Valor'], topServices.map(([k,v])=>[k,money(v)]))}
        ${simpleTable('Indicadores de venta', ['Indicador','Valor'], [['Unidades',units],['Ventas',money(totalVentas)],['Facturas',invoices],['UPT',upt.toFixed(2)],['VPT',money(vpt)],['VPU',money(vpu)]])}
        ${simpleTable('Top 5 productos más vendidos', ['Producto','Unidades'], Object.entries(productUnits).sort((a,b)=>b[1]-a[1]).slice(0,5))}
        ${simpleTable('Top 5 productos más rentables', ['Producto','Utilidad'], Object.entries(productProfit).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([k,v])=>[k,money(v)]))}
        ${simpleTable('Ventas por cliente', ['Cliente','Valor'], Object.entries(clientSales).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([k,v])=>[k,money(v)]))}
        ${simpleTable('Resumen de inventario', ['Indicador','Valor'], [['Valor total valorizado', money(invValue)], ['Cantidad total en stock', invQty]])}
      </div>`;
    initIcons();
    renderCharts([totalVentas,totalCompras,totalGastos], sumPaymentsByMethod([...ventasF, ...registrosF]), projection, goal);
  };

  bindDateFilterGuard('dashboard', render);
  addUnsub(db.collection('ventas').onSnapshot(snap => { ventas = snap.docs.map(doc => ({id:doc.id,...doc.data()})); render(); }));
  addUnsub(db.collection('compras').onSnapshot(snap => { compras = snap.docs.map(doc => ({id:doc.id,...doc.data()})); render(); }));
  addUnsub(db.collection('gastos').onSnapshot(snap => { gastos = snap.docs.map(doc => ({id:doc.id,...doc.data()})); render(); }));
  addUnsub(db.collection('registros').onSnapshot(snap => { registros = snap.docs.map(doc => ({id:doc.id,...doc.data()})); render(); }));
  addUnsub(db.collection('inventario').onSnapshot(snap => { inventario = snap.docs.map(doc => ({id:doc.id,...doc.data()})); render(); }));
  addUnsub(db.collection('ajustes').doc('dashboard').onSnapshot(doc => { metaDoc = doc.exists ? doc.data() : { metaMensual:0 }; render(); }));
}

function metricCard(title, value, icon) {
  const display = typeof value === 'number' && !['Stock total'].includes(title) ? money(value) : escapeHtml(value);
  return `<div class="card metric-card"><div><div class="metric-title">${escapeHtml(title)}</div><div class="metric-value">${display}</div></div><div class="icon-bubble"><i data-lucide="${icon}"></i></div></div>`;
}

function simpleTable(title, headers, rows) {
  return `<div class="card"><h3>${escapeHtml(title)}</h3>${rows.length ? `<div class="table-wrap"><table><thead><tr>${headers.map(h=>`<th>${escapeHtml(h)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${escapeHtml(c)}</td>`).join('')}</tr>`).join('')}</tbody></table></div>` : emptyState('Sin datos en el rango seleccionado.')}</div>`;
}

/* =========================
   20. MAPA DE RENDERIZADO DIFERIDO
   ========================= */
const SECTION_RENDERERS = {
  'dashboard': renderDashboard,
  'habitaciones': renderHabitaciones,
  'clientes': renderClientes,
  'registro-huespedes': renderRegistroHuespedes,
  'historial-registros': renderHistorialRegistros,
  'facturacion': renderFacturacion,
  'ventas': renderVentas,
  'ingreso-compras': renderIngresoCompras,
  'historial-compras': renderHistorialCompras,
  'ingreso-gastos': renderIngresoGastos,
  'historial-gastos': renderHistorialGastos,
  'inventario': renderInventario,
  'productos': renderProductos,
  'servicios': renderServicios,
  'cartera': renderCartera
};

initIcons();
</script>
</body>
</html>
